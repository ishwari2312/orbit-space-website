<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ORBIT</title>

<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Space Grotesk',sans-serif;
}

body{
background:#05010d;
overflow-x:hidden;
color:white;
}

body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
background-size:60px 60px;
z-index:-2;
}

body::after{
content:"";
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle at top right,#7a2cff33,transparent 40%);
z-index:-3;
}

.stars{
position:fixed;
width:100%;
height:100%;
z-index:-1;
}

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:blink 2s infinite;
}

@keyframes blink{
50%{opacity:.2;}
}

nav{
width:90%;
margin:20px auto;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(255,255,255,.03);
backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.1);
border-radius:60px;
}

.logo{
font-size:28px;
font-weight:bold;
color:#d98cff;
}

ul{
display:flex;
list-style:none;
gap:40px;
}

ul li{
cursor:pointer;
transition:.3s;
}

ul li:hover{
color:#d98cff;
}

.launch{
padding:14px 35px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#8b3dff,#d98cff);
color:white;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 30px #8b3dff55;
}

.hero{
width:85%;
margin:auto;
height:85vh;
display:flex;
justify-content:space-between;
align-items:center;
}

.left{
width:60%;
}

.badge{
display:inline-block;
padding:12px 25px;
border-radius:30px;
background:#ffffff08;
border:1px solid #ffffff20;
margin-bottom:25px;
font-size:13px;
letter-spacing:3px;
}

h1{
font-size:100px;
line-height:.9;
}

.gradient{
font-style:italic;
background:linear-gradient(90deg,#ffb8ff,#8b3dff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

p{
margin:30px 0;
font-size:22px;
color:#bdbdcf;
max-width:650px;
}

.buttons{
display:flex;
gap:20px;
}

.btn1{
padding:18px 35px;
border:none;
border-radius:40px;
background:linear-gradient(45deg,#8b3dff,#d98cff);
color:white;
font-size:18px;
cursor:pointer;
box-shadow:0 0 30px #8b3dff66;
}

.btn2{
padding:18px 35px;
background:transparent;
color:white;
border:1px solid #ffffff25;
border-radius:40px;
cursor:pointer;
}

.card{
width:320px;
padding:30px;
background:#ffffff05;
backdrop-filter:blur(20px);
border:1px solid #ffffff15;
border-radius:20px;
box-shadow:0 0 40px #8b3dff20;
}

.row{
display:flex;
justify-content:space-between;
margin:20px 0;
color:#bdbdcf;
}

.value{
color:white;
font-weight:bold;
}

.signal{
color:#57ff9c;
}

.shoot{
position:absolute;
width:120px;
height:2px;
background:linear-gradient(90deg,#fff,transparent);
top:20%;
left:-150px;
transform:rotate(20deg);
animation:shoot 6s linear infinite;
}

@keyframes shoot{
0%{
left:-150px;
top:20%;
}
100%{
left:120%;
top:40%;
}
}
</style>
</head>

<body>

<div class="stars"></div>
<div class="shoot"></div>

<nav>
<div class="logo">ORBIT.</div>

<ul>
<li>Home</li>
<li>Planets</li>
<li>Missions</li>
<li>Gallery</li>
<li>Contact</li>
</ul>

<button class="launch">Launch ↗</button>
</nav>

<section class="hero">

<div class="left">

<div class="badge">
● LIVE TRANSMISSION • DEEP SPACE NETWORK
</div>

<h1>
Beyond the
<br>
<span class="gradient">pale blue dot.</span>
</h1>

<p>
An interactive index of planets, historic missions,
and frontier launches curated for explorers.
</p>

<div class="buttons">
<button class="btn1">Begin Exploration →</button>
<button class="btn2">View Missions</button>
</div>

</div>

<div class="card">

<div class="row">
<span>ORBITAL VELOCITY</span>
<span class="value">27,580 km/h</span>
</div>

<div class="row">
<span>ALTITUDE</span>
<span class="value">408.3 km</span>
</div>

<div class="row">
<span>SIGNAL</span>
<span class="signal">NOMINAL ●</span>
</div>

</div>

</section>

<script>
const stars=document.querySelector(".stars");

for(let i=0;i<150;i++){
let s=document.createElement("div");
s.classList.add("star");
s.style.left=Math.random()*100+"%";
s.style.top=Math.random()*100+"%";
s.style.opacity=Math.random();
s.style.animationDelay=Math.random()*2+"s";
stars.appendChild(s);
}

document.addEventListener("mousemove",(e)=>{
document.querySelector(".card").style.transform=
`translate(${e.clientX/80}px,${e.clientY/80}px)`;
});
</script>

</body>
</html>
